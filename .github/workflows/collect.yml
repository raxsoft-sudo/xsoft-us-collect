name: US State Statute Collect

on:
  workflow_dispatch:
    inputs:
      states:
        description: 'JSON 배열 (예: ["wi","ny","nj","oh","mo","ri"])'
        required: true
        default: '["wi","ny","nj","oh","mo","ri"]'
      smoke:
        description: '0=전수, N>0=N건 후 중단'
        required: false
        default: '0'
      mode:
        description: 'collect=전수집 / diag=인덱스 href 구조 / netcap=SPA XHR API 캡처'
        required: false
        default: 'collect'
      chunk_n:
        description: '청크 총수 (1=무분할, 거대주 분할 시 8 등)'
        required: false
        default: '1'
      chunks:
        description: '청크 인덱스 JSON 배열 (예: ["0","1","2","3"])'
        required: false
        default: '["0"]'

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        state: ${{ fromJSON(inputs.states) }}
        chunk: ${{ fromJSON(inputs.chunks) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright (SPA 주 전용)
        if: inputs.mode == 'diag' || inputs.mode == 'netcap'
        run: |
          pip install playwright || true
          python -m playwright install --with-deps chromium || true

      - name: Run diag
        if: inputs.mode == 'diag'
        run: |
          export RAW_DIR="${GITHUB_WORKSPACE}/out/us-${{ matrix.state }}/statute"
          python adapters/dev_us_${{ matrix.state }}_statute_collect.py --diag
        env:
          NY_OPENLEG_KEY: ${{ secrets.NY_OPENLEG_KEY }}
          CHUNK_N: ${{ inputs.chunk_n }}
          CHUNK_I: ${{ matrix.chunk }}

      - name: Run netcap (SPA XHR API 캡처)
        if: inputs.mode == 'netcap'
        run: |
          export RAW_DIR="${GITHUB_WORKSPACE}/out/us-${{ matrix.state }}/statute"
          python adapters/dev_us_${{ matrix.state }}_statute_collect.py --netcap
        env:
          NY_OPENLEG_KEY: ${{ secrets.NY_OPENLEG_KEY }}
          CHUNK_N: ${{ inputs.chunk_n }}
          CHUNK_I: ${{ matrix.chunk }}

      - name: Run enum
        if: inputs.mode != 'diag'
        run: |
          export RAW_DIR="${GITHUB_WORKSPACE}/out/us-${{ matrix.state }}/statute"
          export SMOKE="${{ inputs.smoke }}"
          mkdir -p "${RAW_DIR}"
          python adapters/dev_us_${{ matrix.state }}_statute_collect.py --enum || true
        env:
          NY_OPENLEG_KEY: ${{ secrets.NY_OPENLEG_KEY }}
          CHUNK_N: ${{ inputs.chunk_n }}
          CHUNK_I: ${{ matrix.chunk }}

      - name: Run collect
        if: inputs.mode != 'diag'
        timeout-minutes: 330
        run: |
          export RAW_DIR="${GITHUB_WORKSPACE}/out/us-${{ matrix.state }}/statute"
          export SMOKE="${{ inputs.smoke }}"
          python adapters/dev_us_${{ matrix.state }}_statute_collect.py --collect
        env:
          NY_OPENLEG_KEY: ${{ secrets.NY_OPENLEG_KEY }}
          CHUNK_N: ${{ inputs.chunk_n }}
          CHUNK_I: ${{ matrix.chunk }}

      - name: Run verify
        if: always() && inputs.mode != 'diag'
        run: |
          export RAW_DIR="${GITHUB_WORKSPACE}/out/us-${{ matrix.state }}/statute"
          python adapters/dev_us_${{ matrix.state }}_statute_collect.py --verify || true
        env:
          NY_OPENLEG_KEY: ${{ secrets.NY_OPENLEG_KEY }}
          CHUNK_N: ${{ inputs.chunk_n }}
          CHUNK_I: ${{ matrix.chunk }}

      - name: Create tarball
        if: always() && inputs.mode != 'diag'
        run: |
          tar czf ${{ matrix.state }}-c${{ matrix.chunk }}.tar.gz -C "${GITHUB_WORKSPACE}/out" us-${{ matrix.state }} || true

      - name: Upload artifact
        if: always() && inputs.mode != 'diag'
        uses: actions/upload-artifact@v4
        with:
          name: statute-${{ matrix.state }}-c${{ matrix.chunk }}
          path: ${{ matrix.state }}-c${{ matrix.chunk }}.tar.gz
          retention-days: 7
          if-no-files-found: warn
